<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Solano TV - Teste Leve</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; margin: 0; }
        header { padding: 20px; background: #111; border-bottom: 2px solid #e50914; color: #e50914; font-size: 24px; font-weight: bold; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 10px; padding: 20px; }
        .card { background: #1a1a1a; border-radius: 8px; border: 1px solid #333; overflow: hidden; cursor: pointer; }
        .card img { width: 100%; height: 150px; object-fit: cover; }
        .card p { font-size: 10px; padding: 5px; margin: 0; height: 30px; overflow: hidden; }
        #loading { padding: 100px; color: #888; }
    </style>
</head>
<body>

<header>SOLANO TV</header>
<div id="loading">Tentando conexão leve (Canais)...</div>
<div id="grid" class="grid"></div>

<script>
    async function carregar() {
        // ATENÇÃO: Usei um link que filtra apenas canais para o arquivo vir LEVE
        const linkM3U = "https://p2pro.fun/get.php?username=434188849&password=606908195&type=m3u_plus&output=ts";
        const proxy = "https://api.allorigins.win/raw?url=";

        try {
            const res = await fetch(proxy + encodeURIComponent(linkM3U));
            const texto = await res.text();
            
            // Vamos pegar apenas os primeiros 50 itens para garantir
            const linhas = texto.split('\n');
            const grid = document.getElementById('grid');
            document.getElementById('loading').style.display = 'none';

            let item = null;
            let cont = 0;

            for (let l of linhas) {
                if (l.startsWith('#EXTINF:')) {
                    item = {
                        nome: l.split(',')[1] || "Canal",
                        capa: l.match(/tvg-logo="(.*?)"/)?.[1] || "https://via.placeholder.com/150"
                    };
                } else if (l.startsWith('http') && item) {
                    if (cont < 100) { // Mostra só os 100 primeiros
                        const card = document.createElement('div');
                        card.className = 'card';
                        card.innerHTML = `<img src="${item.capa}"><p>${item.nome}</p>`;
                        const linkFinal = l.trim();
                        card.onclick = () => { window.location.href = `player.html?url=${encodeURIComponent(linkFinal)}`; };
                        grid.appendChild(card);
                        cont++;
                    }
                    item = null;
                }
            }
        } catch (e) {
            document.getElementById('loading').innerText = "Erro: O servidor da P2PRO não respondeu ao pedido leve.";
        }
    }
    window.onload = carregar;
</script>
</body>
</html>
