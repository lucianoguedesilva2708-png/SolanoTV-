<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SolanoTV - Catálogo Automático</title>
    <style>
        body { background-color: #0d0d0d; color: white; font-family: sans-serif; margin: 0; padding: 0; }
        header { background-color: #b70909; padding: 15px; text-align: center; font-weight: bold; font-size: 22px; letter-spacing: 2px; position: sticky; top: 0; z-index: 1000; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 10px; }
        .card { background: #1a1a1a; border-radius: 4px; overflow: hidden; text-decoration: none; color: white; border: 1px solid #333; transition: 0.3s; display: flex; flex-direction: column; }
        .card:hover { border-color: #b70909; transform: translateY(-3px); }
        .card img { width: 100%; height: 150px; object-fit: contain; background: #000; padding: 5px; box-sizing: border-box; }
        .card h3 { font-size: 10px; padding: 8px 5px; margin: 0; text-align: center; background: #000; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        #status { text-align: center; padding: 20px; color: #b70909; font-weight: bold; }
        @media (max-width: 600px) { .grid { grid-template-columns: repeat(2, 1fr); } }
    </style>
</head>
<body>

    <header>SOLANOTV PRO</header>

    <div id="status">CONECTANDO AO SERVIDOR P2PRO...</div>
    <div class="grid" id="lista-conteudo"></div>

    <script>
        // Link da sua lista com Proxy para evitar bloqueio do navegador
        const PROXY = "https://cors-anywhere.herokuapp.com/";
        const M3U_URL = PROXY + "http://p2pro.fun/get.php?username=434188849&password=606908195&type=m3u_plus&output=hls";

        async function carregarCanais() {
            try {
                const response = await fetch(M3U_URL);
                const text = await response.text();
                const lines = text.split('\n');
                const container = document.getElementById('lista-conteudo');
                document.getElementById('status').style.display = 'none';

                let htmlContent = "";

                for (let i = 0; i < lines.length; i++) {
                    if (lines[i].includes('#EXTINF:')) {
                        // Captura o Nome do Canal/Filme
                        const nome = lines[i].split(',')[1] || "Sem Nome";
                        
                        // Captura a Capa (tvg-logo)
                        const logoMatch = lines[i].match(/tvg-logo="([^"]+)"/);
                        const capa = logoMatch ? logoMatch[1] : "https://via.placeholder.com/150x150?text=Sem+Logo";
                        
                        // Captura o Link (está na linha debaixo)
                        const link = lines[i + 1]?.trim();

                        if (link && link.startsWith('http')) {
                            htmlContent += `
                                <a href="player.html?nome=${encodeURIComponent(nome)}&link=${encodeURIComponent(link)}&capa=${encodeURIComponent(capa)}" class="card">
                                    <img src="${capa}" onerror="this.src='https://via.placeholder.com/150x150?text=Imagem+Erro'">
                                    <h3>${nome}</h3>
                                </a>
                            `;
                        }
                    }
                }
                container.innerHTML = htmlContent;
            } catch (e) {
                document.getElementById('status').innerText = "ERRO: O servidor de proxy está lotado ou o link expirou.";
            }
        }

        carregarCanais();
    </script>
</body>
</html>
