<script>
    // Proxy que simula uma requisição de aplicativo (mais chance de passar pelo bloqueio)
    const PROXY = "https://api.allorigins.win/raw?url=";
    const M3U_URL = PROXY + encodeURIComponent("http://p2pro.fun/get.php?username=434188849&password=606908195&type=m3u_plus&output=hls");

    async function carregarCanais() {
        const status = document.getElementById('status');
        const container = document.getElementById('lista-conteudo');
        
        try {
            status.innerHTML = "SOLICITANDO ACESSO AO P2PRO...<br><small>Aguarde 5 a 10 segundos.</small>";
            
            const response = await fetch(M3U_URL);
            if (!response.ok) throw new Error('Servidor Offline');
            
            const data = await response.text();
            
            // Verifica se a lista não veio vazia (erro comum de login)
            if (data.length < 100) {
                status.innerHTML = "ERRO: Login inválido ou Lista expirada.";
                return;
            }

            const linhas = data.split('\n');
            status.style.display = 'none';
            
            let htmlFinal = "";
            let encontrados = 0;

            for (let i = 0; i < linhas.length; i++) {
                // Procuramos pela tag de informação do canal
                if (linhas[i].includes('#EXTINF:')) {
                    
                    // 1. Extrair Nome (fica após a última vírgula)
                    let nome = linhas[i].split(',').pop().trim();
                    
                    // 2. Extrair Logo/Capa
                    let logoMatch = linhas[i].match(/tvg-logo="([^"]+)"/);
                    let capa = logoMatch ? logoMatch[1] : "https://via.placeholder.com/150x150?text=TV";
                    
                    // 3. Extrair Link (próxima linha que comece com http)
                    let link = "";
                    if (linhas[i+1] && linhas[i+1].trim().startsWith('http')) {
                        link = linhas[i+1].trim();
                    }

                    if (link !== "") {
                        htmlFinal += `
                            <a href="player.html?nome=${encodeURIComponent(nome)}&link=${encodeURIComponent(link)}&capa=${encodeURIComponent(capa)}" class="card">
                                <img src="${capa}" onerror="this.src='https://via.placeholder.com/150x150?text=SOLANO+TV'">
                                <h3>${nome}</h3>
                            </a>
                        `;
                        encontrados++;
                    }
                }
                // LIMITADOR: Se carregar 100 itens, ele já mostra na tela (evita travar)
                if (encontrados >= 100) break;
            }

            container.innerHTML = htmlFinal;

        } catch (error) {
            console.error("Erro detalhado:", error);
            status.innerHTML = "ERRO DE CONEXÃO!<br><small>O servidor de IPTV bloqueou o site ou o Proxy está offline.</small>";
        }
    }

    // Executa a função assim que a página abre
    window.onload = carregarCanais;
                            </script>
