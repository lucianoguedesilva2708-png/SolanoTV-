<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SolanoTV PRO</title>
    <style>
        body { background: #0d0d0d; color: white; font-family: sans-serif; margin: 0; text-align: center; }
        header { background: #b70909; padding: 20px; font-weight: bold; font-size: 22px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 10px; padding: 15px; }
        .card { background: #1a1a1a; border-radius: 5px; border: 1px solid #333; text-decoration: none; color: white; overflow: hidden; }
        .card img { width: 100%; height: 120px; object-fit: contain; background: #000; }
        .card h3 { font-size: 10px; margin: 5px; height: 30px; overflow: hidden; }
        #status { padding: 50px; color: #b70909; font-weight: bold; }
    </style>
</head>
<body>

<header>SOLANOTV PRO</header>
<div id="status">INICIANDO CARREGAMENTO...</div>
<div class="grid" id="lista"></div>

<script>
    // Testaremos o AllOrigins que é mais estável para o GitHub
    const rawUrl = "http://p2pro.fun/get.php?username=434188849&password=606908195&type=m3u_plus&output=hls";
    const proxyUrl = "https://api.allorigins.win/raw?url=" + encodeURIComponent(rawUrl);

    async function baixarLista() {
        const statusDiv = document.getElementById('status');
        const listaDiv = document.getElementById('lista');

        try {
            const response = await fetch(proxyUrl);
            if (!response.ok) throw new Error("Erro na rede");
            
            const texto = await response.text();
            if (texto.length < 100) throw new Error("Lista vazia");

            const linhas = texto.split('\n');
            let cardsHtml = "";
            let cont = 0;

            for (let i = 0; i < linhas.length; i++) {
                if (linhas[i].includes("#EXTINF:")) {
                    const info = linhas[i];
                    const url = linhas[i+1] ? linhas[i+1].trim() : "";
                    
                    if (url.startsWith("http")) {
                        const nome = info.split(',').pop().trim();
                        const logoMatch = info.match(/tvg-logo="([^"]+)"/);
                        const logo = logoMatch ? logoMatch[1] : "https://via.placeholder.com/150?text=TV";

                        cardsHtml += `
                            <a href="player.html?nome=${encodeURIComponent(nome)}&link=${encodeURIComponent(url)}" class="card">
                                <img src="${logo}" onerror="this.src='https://via.placeholder.com/150?text=SOLANO'">
                                <h3>${nome}</h3>
                            </a>
                        `;
                        cont++;
                    }
                }
                if (cont >= 150) break; // Limite para carregar rápido
            }

            statusDiv.style.display = 'none';
            listaDiv.innerHTML = cardsHtml;

        } catch (erro) {
            statusDiv.innerHTML = "ERRO AO CARREGAR LISTA.<br>O servidor de IPTV bloqueou a conexão externa.<br><br>Dica: Tente usar um aplicativo de IPTV com seus dados para conferir se o login está ativo.";
            console.error(erro);
        }
    }

    baixarLista();
</script>
</body>
</html>
