<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SolanoTV PRO - IPTV</title>
    <style>
        body { background-color: #0d0d0d; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 0; }
        header { background-color: #b70909; padding: 20px; text-align: center; font-weight: bold; font-size: 24px; letter-spacing: 3px; position: sticky; top: 0; z-index: 1000; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        
        /* Barra de Pesquisa */
        .search-container { padding: 15px; display: flex; justify-content: center; background: #1a1a1a; border-bottom: 2px solid #b70909; }
        #search-input { width: 90%; max-width: 500px; padding: 12px; border-radius: 25px; border: none; background: #333; color: white; font-size: 16px; outline: none; border: 1px solid #444; }
        #search-input:focus { border-color: #b70909; box-shadow: 0 0 10px rgba(183, 9, 9, 0.3); }

        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; padding: 15px; }
        .card { background: #1a1a1a; border-radius: 8px; overflow: hidden; text-decoration: none; color: white; border: 1px solid #333; transition: 0.3s; display: flex; flex-direction: column; position: relative; }
        .card:hover { border-color: #b70909; transform: translateY(-5px); }
        .card img { width: 100%; height: 140px; object-fit: contain; background: #000; padding: 10px; box-sizing: border-box; }
        .card h3 { font-size: 11px; padding: 10px 5px; margin: 0; text-align: center; background: #050505; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; border-top: 1px solid #222; }
        
        #status { text-align: center; padding: 40px; color: #b70909; font-size: 18px; font-weight: bold; }
        
        /* Ajuste para Celular */
        @media (max-width: 600px) { .grid { grid-template-columns: repeat(2, 1fr); } .card img { height: 120px; } }
    </style>
</head>
<body>

    <header>SOLANOTV PRO</header>

    <div class="search-container">
        <input type="text" id="search-input" placeholder="Pesquisar canal, filme ou série..." onkeyup="filtrarCanais()">
    </div>

    <div id="status">CONECTANDO AO SERVIDOR...</div>
    <div class="grid" id="lista-conteudo"></div>

    <script>
        // Proxy estável sem necessidade de ativação manual
        const PROXY = "https://api.allorigins.win/raw?url=";
        const URL_LISTA = "http://p2pro.fun/get.php?username=434188849&password=606908195&type=m3u_plus&output=hls";
        
        async function carregarLista() {
            try {
                const response = await fetch(PROXY + encodeURIComponent(URL_LISTA));
                const data = await response.text();
                const linhas = data.split('\n');
                const container = document.getElementById('lista-conteudo');
                document.getElementById('status').style.display = 'none';

                let cardsHTML = "";
                let count = 0;

                for (let i = 0; i < linhas.length; i++) {
                    if (linhas[i].includes('#EXTINF:')) {
                        // Extrai Nome
                        const nome = linhas[i].split(',')[1] || "Sem Nome";
                        
                        // Extrai Capa
                        const logoMatch = linhas[i].match(/tvg-logo="([^"]+)"/);
                        const capa = logoMatch ? logoMatch[1] : "https://via.placeholder.com/150x150?text=SOLANOTV";
                        
                        // Link do vídeo
                        const link = linhas[i + 1]?.trim();

                        if (link && link.startsWith('http')) {
                            cardsHTML += `
                                <a href="player.html?nome=${encodeURIComponent(nome)}&link=${encodeURIComponent(link)}&capa=${encodeURIComponent(capa)}" class="card" data-nome="${nome.toLowerCase()}">
                                    <img src="${capa}" onerror="this.src='https://via.placeholder.com/150x150?text=SOLANOTV'">
                                    <h3>${nome}</h3>
                                </a>
                            `;
                            count++;
                        }
                    }
                    // Limitamos a 600 itens para manter o site rápido
                    if (count > 600) break;
                }
                container.innerHTML = cardsHTML;
            } catch (error) {
                document.getElementById('status').innerText = "ERRO AO CARREGAR LISTA. VERIFIQUE SEU LINK.";
            }
        }

        function filtrarCanais() {
            const input = document.getElementById('search-input').value.toLowerCase();
            const cards = document.getElementsByClassName('card');

            for (let i = 0; i < cards.length; i++) {
                const nome = cards[i].getAttribute('data-nome');
                if (nome.includes(input)) {
                    cards[i].style.display = "flex";
                } else {
                    cards[i].style.display = "none";
                }
            }
        }

        carregarLista();
    </script>
</body>
</html>
