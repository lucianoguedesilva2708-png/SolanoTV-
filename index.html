<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SolanoTV - Oficial</title>
    <style>
        body { background-color: #0d0d0d; color: white; font-family: sans-serif; margin: 0; padding: 0; }
        header { background-color: #b70909; padding: 15px; text-align: center; font-weight: bold; font-size: 22px; }
        .categorias { display: flex; justify-content: center; gap: 5px; padding: 15px; background: #1a1a1a; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #333; overflow-x: auto; }
        .cat-btn { background: #333; color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; font-size: 12px; font-weight: bold; }
        .cat-btn.active { background: #b70909; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 10px; }
        .card { background: #1a1a1a; border-radius: 8px; overflow: hidden; text-decoration: none; color: white; border: 1px solid #333; display: flex; flex-direction: column; }
        .card img { width: 100%; height: 200px; object-fit: cover; background: #222; }
        .card h3 { font-size: 13px; padding: 10px; margin: 0; text-align: center; flex-grow: 1; }
    </style>
</head>
<body>

<header>SOLANOTV</header>

<div class="categorias">
    <button class="cat-btn active" onclick="filtrar('tv', this)">CANAIS</button>
    <button class="cat-btn" onclick="filtrar('filme', this)">FILMES</button>
    <button class="cat-btn" onclick="filtrar('serie', this)">SÉRIES</button>
    <button class="cat-btn" onclick="filtrar('anime', this)">ANIMES</button>
</div>

<div class="grid" id="lista">
    <a href="player_tv.html?nome=SBT&link=https://p3-sbt-atv.akamaized.net/hls/live/2111818/sbt-atv/master.m3u8" class="card" data-cat="tv">
        <img src="https://upload.wikimedia.org/wikipedia/commons/2/22/SBT_logo.svg">
        <h3>SBT Ao Vivo</h3>
    </a>
    <a href="player_tv.html?nome=Canal de Filmes 24h&link=https://raw.githubusercontent.com/Tiptop684/Trilhos-IPTV/main/canais/acao.m3u8" class="card" data-cat="tv">
        <img src="https://images.unsplash.com/photo-1594909122845-11baa439b7bf?q=80&w=500">
        <h3>Cine Ação 24h</h3>
    </a>

    <a href="detalhes.html?nome=Deadpool e Wolverine&capa=https://www.themoviedb.org/t/p/w600_and_h900_bestv2/7vKxl9I4DksS8B0lJpXf98Y0BvN.jpg&duracao=2024&tipo=filme&eps=https://f1.vidsite.xyz/movies/Deadpool.e.Wolverine.2024.1080p.Dual.Audio.mp4" class="card" data-cat="filme">
        <img src="https://www.themoviedb.org/t/p/w600_and_h900_bestv2/7vKxl9I4DksS8B0lJpXf98Y0BvN.jpg">
        <h3>Deadpool & Wolverine</h3>
    </a>
</div>

<script>
    function filtrar(cat, btn) {
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.querySelectorAll('.card').forEach(card => {
            card.style.display = (card.getAttribute('data-cat') === cat) ? 'flex' : 'none';
        });
    }
    // Inicia nos canais para testar o SBT
    window.onload = () => filtrar('tv', document.querySelector('.cat-btn'));
</script>
</body>
</html>
