<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solano TV - Oficial</title>
    <style>
        body { background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; text-align: center; }
        header { padding: 20px; border-bottom: 2px solid #e50914; background: #111; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; padding: 20px; }
        .card { background: #1a1a1a; border-radius: 10px; overflow: hidden; cursor: pointer; border: 1px solid #333; transition: 0.3s; }
        .card:hover { transform: scale(1.05); border-color: #e50914; }
        .card img { width: 100%; height: 200px; object-fit: cover; }
        .card p { font-size: 11px; padding: 10px; margin: 0; height: 35px; overflow: hidden; }
        #loading { padding: 100px; color: #888; font-size: 18px; }
        #player { display:none; position:fixed; inset:0; background:#000; z-index:9999; }
        .close { position:absolute; top:20px; right:20px; font-size:50px; color:#fff; cursor:pointer; z-index:10000; }
        video { width:100%; height:100%; }
    </style>
</head>
<body>

<header><h1>SOLANO TV</h1></header>

<div id="loading">Sincronizando com servidor P2PRO...<br><small>Aguarde a resposta do link...</small></div>
<div id="grid" class="grid"></div>

<div id="player">
    <span class="close" onclick="fechar()">&times;</span>
    <video id="vid" controls autoplay></video>
</div>

<script>
    // Usando o seu link encurtado
    const URL_ENCURTADA = 'https://test.rb.gy/2nm';

    async function carregar() {
        const grid = document.getElementById('grid');
        const loading = document.getElementById('loading');

        try {
            // O Proxy "cors-anywhere" disfarçado para tentar pular o bloqueio
            const proxy = "https://api.allorigins.win/raw?url=";
            const res = await fetch(proxy + encodeURIComponent(URL_ENCURTADA));
            const texto = await res.text();

            // Se o texto não começar com #EXTM3U, o link redirecionou para uma página de erro
            if (!texto.includes("#EXTM3U")) {
                throw new Error("O servidor entregou uma página de erro, não a lista.");
            }

            loading.style.display = 'none';
            const linhas = texto.split('\n');
            let itemAtual = null;

            linhas.forEach(linha => {
                linha = linha.trim();
                if (linha.startsWith('#EXTINF:')) {
                    itemAtual = {
                        nome: linha.split(',')[1] || "Sem Nome",
                        capa: linha.match(/tvg-logo="(.*?)"/)?.[1] || "https://via.placeholder.com/150x200?text=Sem+Capa"
                    };
                } else if (linha.startsWith('http') && itemAtual) {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `<img src="${itemAtual.capa}"><p>${itemAtual.nome}</p>`;
                    
                    const videoUrl = linha;
                    card.onclick = () => {
                        document.getElementById('player').style.display = 'block';
                        const v = document.getElementById('vid');
                        v.src = videoUrl;
                        v.play();
                    };
                    grid.appendChild(card);
                    itemAtual = null;
                }
            });

        } catch (e) {
            loading.innerHTML = `<b style="color:#e50914">ACESSO NEGADO</b><br><br>
            O servidor da P2PRO bloqueou a conexão automática.<br><br>
            <b>Como resolver:</b><br>
            1. Abra o link <a href="${URL_ENCURTADA}" target="_blank" style="color:#fff">CLICANDO AQUI</a>.<br>
            2. Se ele baixar um arquivo, renomeie para <b>dados.txt</b> e suba no seu GitHub.<br>
            3. Se ele NÃO abrir nada, sua conta P2PRO pode estar vencida ou bloqueada para Web.`;
        }
    }

    function fechar() {
        document.getElementById('player').style.display = 'none';
        const v = document.getElementById('vid');
        v.pause();
        v.src = "";
    }

    window.onload = carregar;
</script>

</body>
</html>
