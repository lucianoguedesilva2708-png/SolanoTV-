<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solano TV - Oficial</title>
    <style>
        :root { --primary: #e50914; --bg: #0a0a0a; --card-bg: #141414; --text: #fff; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; }
        header { position: sticky; top: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); padding: 15px; z-index: 1000; border-bottom: 1px solid #222; text-align: center; }
        .logo { font-size: 22px; font-weight: 900; color: var(--primary); margin-bottom: 10px; }
        .menu, .categorias-bar { display: flex; overflow-x: auto; gap: 8px; padding: 5px; justify-content: center; }
        .categorias-bar { justify-content: flex-start; scrollbar-width: none; }
        .btn { background: #222; color: #fff; border: none; padding: 8px 15px; border-radius: 20px; cursor: pointer; font-size: 12px; white-space: nowrap; }
        .btn.active { background: var(--primary); }
        .container { display: grid; padding: 15px; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 15px; }
        .card { background: var(--card-bg); border-radius: 8px; overflow: hidden; border: 1px solid #222; cursor: pointer; }
        .card img { width: 100%; height: 170px; object-fit: cover; background: #222; }
        .card p { padding: 5px; font-size: 11px; text-align: center; margin: 0; height: 30px; overflow: hidden; }
        #player-modal { display: none; position: fixed; inset: 0; background: #000; z-index: 2000; flex-direction: column; }
        .fechar { padding: 20px; color: #fff; font-size: 30px; align-self: flex-end; cursor: pointer; background: none; border: none; }
        video { width: 100%; height: auto; max-height: 80vh; margin: auto; }
        #status { text-align: center; padding: 50px; color: #888; }
    </style>
</head>
<body>

<header>
    <div class="logo">SOLANO TV</div>
    <div class="menu">
        <button class="btn active" onclick="mudarTipo('filmes', this)">FILMES</button>
        <button class="btn" onclick="mudarTipo('series', this)">SÉRIES</button>
        <button class="btn" onclick="mudarTipo('animes', this)">ANIMES</button>
    </div>
    <div id="sub-cats" class="categorias-bar"></div>
</header>

<div id="status">Conectando ao servidor P2PRO...</div>
<div id="main-grid" class="container"></div>

<div id="player-modal">
    <button class="fechar" onclick="fecharPlayer()">&times;</button>
    <div id="vid-cont" style="display:flex; flex:1;"></div>
</div>

<script>
    const URL_LISTA = 'https://p2pro.fun/get.php?username=434188849&password=606908195&type=m3u_plus&output=hls';
    let DADOS = [];

    async function carregar() {
        const status = document.getElementById('status');
        try {
            // Tentativa com um proxy diferente (Corsproxy.io)
            const res = await fetch('https://corsproxy.io/?' + encodeURIComponent(URL_LISTA));
            if (!res.ok) throw new Error();
            const texto = await res.text();
            
            DADOS = interpretarM3U(texto);
            status.style.display = 'none';
            mudarTipo('filmes', document.querySelector('.menu .btn'));
        } catch (e) {
            status.innerHTML = `<b style="color:var(--primary)">Erro de Conexão</b><br>O servidor da lista bloqueou o acesso.<br><br>
            <button onclick="window.location.reload()" style="padding:10px; border-radius:5px; border:none; cursor:pointer;">Tentar Novamente</button>`;
        }
    }

    function interpretarM3U(txt) {
        const itens = [];
        const linhas = txt.split('\n');
        let obj = null;

        linhas.forEach(l => {
            if (l.includes('#EXTINF:')) {
                const g = l.match(/group-title="(.*?)"/)?.[1] || "Geral";
                const c = l.match(/tvg-logo="(.*?)"/)?.[1] || "";
                const n = l.split(',')[1] || "Sem nome";
                
                if (!g.toLowerCase().includes('canais')) {
                    let t = 'filmes';
                    if (g.toLowerCase().includes('serie') || g.toLowerCase().includes('season')) t = 'series';
                    else if (g.toLowerCase().includes('anime')) t = 'animes';
                    obj = { n, c, g, t };
                }
            } else if (l.startsWith('http') && obj) {
                obj.l = l.trim();
                itens.push(obj);
                obj = null;
            }
        });
        return itens;
    }

    function mudarTipo(tipo, btn) {
        document.querySelectorAll('.menu .btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        
        const sub = document.getElementById('sub-cats');
        const grupos = [...new Set(DADOS.filter(i => i.t === tipo).map(i => i.g))];
        
        sub.innerHTML = `<button class="btn active" onclick="render('todas', '${tipo}', this)">TUDO</button>`;
        grupos.forEach(g => {
            sub.innerHTML += `<button class="btn" onclick="render('${g}', '${tipo}', this)">${g}</button>`;
        });
        render('todas', tipo, sub.firstChild);
    }

    function render(grupo, tipo, btn) {
        document.querySelectorAll('#sub-cats .btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        
        const grid = document.getElementById('main-grid');
        grid.innerHTML = '';
        
        DADOS.filter(i => i.t === tipo && (grupo === 'todas' || i.g === grupo)).forEach(item => {
            const d = document.createElement('div');
            d.className = 'card';
            d.onclick = () => abrir(item.l);
            d.innerHTML = `<img src="${item.c}" onerror="this.src='https://via.placeholder.com/150x170/222/fff?text=DVD'"><p>${item.n}</p>`;
            grid.appendChild(d);
        });
    }

    function abrir(url) {
        document.getElementById('player-modal').style.display = 'flex';
        document.getElementById('vid-cont').innerHTML = `<video controls autoplay src="${url}"></video>`;
    }

    function fecharPlayer() {
        document.getElementById('player-modal').style.display = 'none';
        document.getElementById('vid-cont').innerHTML = '';
    }

    window.onload = carregar;
</script>
</body>
</html>
