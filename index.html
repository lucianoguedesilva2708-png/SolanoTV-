<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SolanoTV PRO - Oficial</title>
    <style>
        :root { --cor: #b70909; --bg: #0d0d0d; --card: #1a1a1a; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; padding-bottom: 50px; overflow-x: hidden; }
        
        /* Header e Busca */
        header { background: var(--cor); padding: 15px; text-align: center; font-weight: bold; position: sticky; top: 0; z-index: 1000; }
        .controles { background: #111; position: sticky; top: 50px; z-index: 999; padding: 10px; border-bottom: 2px solid var(--cor); }
        input { width: 94%; padding: 12px; border-radius: 5px; border: none; background: #222; color: white; margin-bottom: 10px; }
        
        /* Menu de Categorias */
        .menu-cats { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 5px; scrollbar-width: none; }
        .menu-cats::-webkit-scrollbar { display: none; }
        .btn-cat { background: #333; color: white; border: none; padding: 10px 20px; border-radius: 20px; font-weight: bold; cursor: pointer; white-space: nowrap; }
        .btn-cat.active { background: var(--cor); }

        /* Grid */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 10px; padding: 10px; }
        .card { background: var(--card); border-radius: 6px; text-decoration: none; color: white; overflow: hidden; height: 175px; border: 1px solid #222; transition: 0.2s; }
        .card img { width: 100%; height: 125px; object-fit: cover; background: #000; }
        .card h3 { font-size: 10px; margin: 0; padding: 5px; text-align: center; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        
        #loading { text-align: center; padding: 50px; color: var(--cor); }
    </style>
</head>
<body>

<header>SOLANOTV PRO</header>

<div class="controles">
    <input type="text" id="busca" placeholder="O que vamos assistir hoje?" oninput="filtrar()">
    <div class="menu-cats">
        <button class="btn-cat active" onclick="mudarCat('TV', this)">CANAIS TV</button>
        <button class="btn-cat" onclick="mudarCat('Movies', this)">FILMES</button>
        <button class="btn-cat" onclick="mudarCat('Series', this)">SÉRIES</button>
    </div>
</div>

<div id="loading">SINCRONIZANDO LISTA...</div>
<div class="grid" id="container"></div>

<script>
    const M3U_URL = "http://p2pro.fun/get.php?username=434188849&password=606908195&type=m3u_plus&output=hls";
    const PROXY = "https://api.codetabs.com/v1/proxy?quest=";
    
    let db = [];
    let seriesAgrupadas = {};
    let catAtual = 'TV';
    let exibidos = 0;
    const STEP = 50;

    async function carregar() {
        try {
            const res = await fetch(PROXY + encodeURIComponent(M3U_URL));
            const data = await res.text();
            processar(data);
        } catch (e) { document.getElementById('loading').innerText = "Erro ao conectar."; }
    }

    function processar(texto) {
        const linhas = texto.split('\n');
        for (let i = 0; i < linhas.length; i++) {
            if (linhas[i].includes("#EXTINF:")) {
                let nome = linhas[i].split(',').pop().trim();
                let logo = linhas[i].match(/tvg-logo="([^"]+)"/)?.[1] || "";
                let url = linhas[i+1]?.trim();
                
                if (url && url.startsWith("http")) {
                    let c = "TV";
                    if (url.includes("/movie/")) c = "Movies";
                    else if (url.includes("/series/")) {
                        c = "Series";
                        let sNome = nome.split(/S\d+|E\d+/i)[0].trim();
                        if (!seriesAgrupadas[sNome]) {
                            seriesAgrupadas[sNome] = { n: sNome, l: logo, eps: [] };
                            db.push({ n: sNome, l: logo, u: 'SERIE', c: 'Series' });
                        }
                        seriesAgrupadas[sNome].eps.push({ n: nome, u: url });
                        continue;
                    }
                    db.push({ n: nome, l: logo, u: url, c: c });
                }
            }
        }
        document.getElementById('loading').style.display = 'none';
        render(true);
    }

    function render(limpar = false) {
        const container = document.getElementById('container');
        if (limpar) { container.innerHTML = ''; exibidos = 0; }
        
        const busca = document.getElementById('busca').value.toLowerCase();
        const filtrados = db.filter(i => i.c === catAtual && i.n.toLowerCase().includes(busca));
        
        const novos = filtrados.slice(exibidos, exibidos + STEP);
        container.innerHTML += novos.map(item => {
            // DECISÃO DE PLAYER: Canais vão para player_canais.html
            let playerP = (item.c === 'TV') ? 'player_canais.html' : 'player.html';
            
            let acao = item.u === 'SERIE' 
                ? `onclick="verEps('${item.n.replace(/'/g, "\\'")}'); return false;" href="#"`
                : `href="${playerP}?nome=${encodeURIComponent(item.n)}&link=${encodeURIComponent(item.u)}&capa=${encodeURIComponent(item.l)}"`;
            
            return `<a ${acao} class="card"><img src="${item.l}" loading="lazy" onerror="this.src='https://via.placeholder.com/150x125?text=SOLANO'"><h3>${item.n}</h3></a>`;
        }).join('');
        exibidos += STEP;
    }

    function mudarCat(cat, btn) {
        catAtual = cat;
        document.querySelectorAll('.btn-cat').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        window.scrollTo(0,0);
        render(true);
    }

    function filtrar() { render(true); }

    function verEps(nome) {
        const s = seriesAgrupadas[nome];
        document.body.innerHTML = `<button style="background:red;color:white;padding:15px;width:100%;border:none;font-weight:bold" onclick="location.reload()">⬅ VOLTAR</button><div class="grid">` + 
            s.eps.map(e => `<a href="player.html?nome=${encodeURIComponent(e.n)}&link=${encodeURIComponent(e.u)}&capa=${encodeURIComponent(s.l)}" class="card"><img src="${s.l}"><h3>${e.n}</h3></a>`).join('') + `</div>`;
    }

    window.onscroll = () => {
        if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 500) render();
    };

    carregar();
</script>
</body>
</html>
