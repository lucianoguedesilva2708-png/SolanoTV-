<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SolanoTV PRO - Final</title>
    <style>
        :root { --cor: #b70909; --bg: #0d0d0d; --card: #1a1a1a; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; padding-bottom: 50px; }
        header { background: var(--cor); padding: 15px; text-align: center; font-weight: bold; position: sticky; top: 0; z-index: 100; }
        .busca-box { padding: 10px; background: var(--card); position: sticky; top: 50px; z-index: 99; display: flex; flex-direction: column; gap: 8px; }
        input { padding: 12px; border-radius: 5px; border: 1px solid #333; background: #222; color: white; outline: none; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 10px; padding: 10px; }
        .card { background: var(--card); border-radius: 6px; text-decoration: none; color: white; overflow: hidden; height: 170px; border: 1px solid #222; }
        .card img { width: 100%; height: 120px; object-fit: cover; background: #000; }
        .card h3 { font-size: 10px; margin: 0; padding: 5px; text-align: center; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        #loading { text-align: center; padding: 40px; color: var(--cor); font-weight: bold; }
        .btn-voltar { background: var(--cor); color: white; border: none; padding: 10px; width: 100%; cursor: pointer; }
    </style>
</head>
<body>

<header>SOLANOTV PRO</header>

<div class="busca-box">
    <input type="text" id="inputBusca" placeholder="Pesquisar em toda a lista..." oninput="executarBusca()">
</div>

<div id="loading">SINCRONIZANDO LISTA...</div>
<div class="grid" id="container"></div>

<script>
    const M3U_URL = "http://p2pro.fun/get.php?username=434188849&password=606908195&type=m3u_plus&output=hls";
    const PROXY = "https://api.codetabs.com/v1/proxy?quest=";
    
    let bancoCompleto = [];
    let seriesAgrupadas = {};
    let filtrados = [];
    let exibidos = 0;
    const STEP = 60;

    async function carregar() {
        try {
            const res = await fetch(PROXY + encodeURIComponent(M3U_URL));
            const data = await res.text();
            
            const linhas = data.split('\n');
            for (let i = 0; i < linhas.length; i++) {
                if (linhas[i].includes("#EXTINF:")) {
                    let nome = linhas[i].split(',').pop().trim();
                    let logo = linhas[i].match(/tvg-logo="([^"]+)"/)?.[1] || "";
                    let url = linhas[i+1]?.trim();
                    
                    if (url && url.startsWith("http")) {
                        if (url.includes("/series/")) {
                            let sNome = nome.split(/S\d+|E\d+/i)[0].trim();
                            if (!seriesAgrupadas[sNome]) {
                                seriesAgrupadas[sNome] = { n: sNome, l: logo, eps: [] };
                                bancoCompleto.push({ n: sNome, l: logo, u: 'SERIE' });
                            }
                            seriesAgrupadas[sNome].eps.push({ n: nome, u: url });
                        } else {
                            bancoCompleto.push({ n: nome, l: logo, u: url });
                        }
                    }
                }
            }
            document.getElementById('loading').style.display = 'none';
            filtrados = [...bancoCompleto];
            mostrarMais(true);
        } catch (e) { document.getElementById('loading').innerText = "Erro ao carregar lista."; }
    }

    function mostrarMais(limpar = false) {
        const container = document.getElementById('container');
        if (limpar) { container.innerHTML = ''; exibidos = 0; }
        
        const novos = filtrados.slice(exibidos, exibidos + STEP);
        container.innerHTML += novos.map(item => {
            let acao = item.u === 'SERIE' 
                ? `onclick="verEps('${item.n.replace(/'/g, "\\'")}'); return false;" href="#"`
                : `href="player.html?nome=${encodeURIComponent(item.n)}&link=${encodeURIComponent(item.u)}&capa=${encodeURIComponent(item.l)}"`;
            return `<a ${acao} class="card"><img src="${item.l}" loading="lazy" onerror="this.src='https://via.placeholder.com/150x120?text=SOLANO'"><h3>${item.n}</h3></a>`;
        }).join('');
        exibidos += STEP;
    }

    function executarBusca() {
        const busca = document.getElementById('inputBusca').value.toLowerCase();
        filtrados = bancoCompleto.filter(i => i.n.toLowerCase().includes(busca));
        mostrarMais(true);
    }

    function verEps(nome) {
        const s = seriesAgrupadas[nome];
        document.body.innerHTML = `<button class="btn-voltar" onclick="location.reload()">⬅ VOLTAR</button><div class="grid">` + 
            s.eps.map(e => `<a href="player.html?nome=${encodeURIComponent(e.n)}&link=${encodeURIComponent(e.u)}&capa=${encodeURIComponent(s.l)}" class="card"><img src="${s.l}"><h3>${e.n}</h3></a>`).join('') + `</div>`;
    }

    window.onscroll = () => {
        if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 800) {
            if (exibidos < filtrados.length) mostrarMais();
        }
    };

    carregar();
</script>
</body>
</html>
