       <script>
    const M3U_URL = "http://p2pro.fun/get.php?username=434188849&password=606908195&type=m3u_plus&output=hls";
    const PROXY = "https://api.codetabs.com/v1/proxy?quest=";
    
    let bancoDeDados = [];
    let seriesAgrupadas = {};

    async function iniciar() {
        // 1. Tenta carregar a lista que já está salva na memória do navegador
        const listaSalva = localStorage.getItem('solano_tv_cache');
        const dataSalva = localStorage.getItem('solano_tv_data');
        
        // Verifica se a lista foi salva há menos de 24 horas para não ficar obsoleta
        const cacheAntigo = dataSalva && (Date.now() - dataSalva > 86400000);

        if (listaSalva && !cacheAntigo) {
            console.log("Carregando do Cache...");
            processarM3U(listaSalva);
        } else {
            console.log("Baixando lista nova...");
            try {
                const res = await fetch(PROXY + encodeURIComponent(M3U_URL));
                const texto = await res.text();
                
                // Salva na memória para a próxima vez
                localStorage.setItem('solano_tv_cache', texto);
                localStorage.setItem('solano_tv_data', Date.now().toString());
                
                processarM3U(texto);
            } catch (e) { 
                document.getElementById('carregando').innerText = "Erro ao conectar. Tente recarregar."; 
            }
        }
    }

    function processarM3U(texto) {
        const linhas = texto.split('\n');
        bancoDeDados = []; // Limpa para evitar duplicados
        seriesAgrupadas = {};

        for (let i = 0; i < linhas.length; i++) {
            if (linhas[i].includes("#EXTINF:")) {
                let nomeCompleto = linhas[i].split(',').pop().trim();
                const logo = linhas[i].match(/tvg-logo="([^"]+)"/)?.[1] || "";
                const url = linhas[i+1]?.trim();
                
                if (url && url.startsWith("http")) {
                    if (url.includes("/series/")) {
                        // Agrupamento de Séries (Melhorado)
                        let nomeSerie = nomeCompleto.split(/S\d+|E\d+|T\d+/i)[0].trim();
                        if (!seriesAgrupadas[nomeSerie]) {
                            seriesAgrupadas[nomeSerie] = { n: nomeSerie, l: logo, eps: [] };
                            bancoDeDados.push({ n: nomeSerie, l: logo, u: 'SERIE', c: 'Series' });
                        }
                        seriesAgrupadas[nomeSerie].eps.push({ n: nomeCompleto, u: url });
                    } else {
                        let cat = url.includes("/movie/") ? "Movies" : "TV";
                        bancoDeDados.push({ n: nomeCompleto, l: logo, u: url, c: cat });
                    }
                }
            }
        }
        document.getElementById('carregando').style.display = 'none';
        render(bancoDeDados.slice(0, 150));
    }

    // Função de Renderizar e Outras permanecem iguais...
    function render(lista) {
        const grid = document.getElementById('listaPrincipal');
        grid.innerHTML = lista.map(item => {
            let linkAcao = item.u === 'SERIE' 
                ? `onclick="abrirEps('${item.n.replace(/'/g, "\\'")}'); return false;" href="#"`
                : `href="player.html?nome=${encodeURIComponent(item.n)}&link=${encodeURIComponent(item.u)}&capa=${encodeURIComponent(item.l)}"`;
            
            return `
                <a ${linkAcao} class="card">
                    <img src="${item.l}" loading="lazy" onerror="this.src='https://via.placeholder.com/150x120?text=TV'">
                    <h3>${item.n}</h3>
                </a>
            `;
        }).join('');
    }

    // Botão para forçar atualização da lista (opcional)
    function atualizarLista() {
        localStorage.removeItem('solano_tv_cache');
        location.reload();
    }

    iniciar();
</script>
