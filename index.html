<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SolanoTV PRO - Ultra Fast</title>
    <style>
        :root { --vermelho: #b70909; --preto: #0d0d0d; --cinza: #1a1a1a; }
        body { background: var(--preto); color: white; font-family: sans-serif; margin: 0; overflow-x: hidden; }
        
        /* Header Fixo */
        header { background: var(--vermelho); padding: 15px; text-align: center; font-weight: bold; position: sticky; top: 0; z-index: 1000; }
        
        /* Área de Busca e Filtros */
        .controles { background: var(--cinza); padding: 10px; position: sticky; top: 54px; z-index: 999; display: flex; flex-direction: column; gap: 10px; }
        #txtBusca { padding: 12px; border-radius: 5px; border: 1px solid #444; background: #333; color: white; }
        
        .filtros { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 5px; }
        .filtros button { background: #333; color: white; border: none; padding: 8px 15px; border-radius: 20px; font-size: 12px; cursor: pointer; white-space: nowrap; }
        .filtros button.active { background: var(--vermelho); }

        /* Grid Otimizada */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 10px; padding: 10px; }
        
        /* Card Leve */
        .card { background: var(--cinza); border-radius: 6px; text-decoration: none; color: white; overflow: hidden; height: 170px; border: 1px solid #222; }
        .card img { width: 100%; height: 120px; object-fit: cover; background: #000; content-visibility: auto; }
        .card h3 { font-size: 10px; margin: 0; padding: 8px 5px; text-align: center; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }

        #carregando { text-align: center; padding: 50px; color: var(--vermelho); }
    </style>
</head>
<body>

<header>SOLANOTV PRO</header>

<div class="controles">
    <input type="text" id="txtBusca" placeholder="Pesquisar..." oninput="aoDigitar()">
    <div class="filtros">
        <button class="btn-cat active" onclick="filtrarCat('todos', this)">TODOS</button>
        <button class="btn-cat" onclick="filtrarCat('TV', this)">CANAIS</button>
        <button class="btn-cat" onclick="filtrarCat('Movies', this)">FILMES</button>
        <button class="btn-cat" onclick="filtrarCat('Series', this)">SÉRIES</button>
    </div>
</div>

<div id="carregando">Lendo lista...</div>
<div class="grid" id="listaPrincipal"></div>

<script>
    const M3U_URL = "http://p2pro.fun/get.php?username=434188849&password=606908195&type=m3u_plus&output=hls";
    const PROXY = "https://api.codetabs.com/v1/proxy?quest=";
    
    let baseTotal = [];
    let categoriaAtual = 'todos';
    let timeoutBusca;

    async function iniciar() {
        try {
            const res = await fetch(PROXY + encodeURIComponent(M3U_URL));
            const data = await res.text();
            processarM3U(data);
        } catch (e) {
            document.getElementById('carregando').innerText = "Erro ao conectar.";
        }
    }

    function processarM3U(texto) {
        const linhas = texto.split('\n');
        for (let i = 0; i < linhas.length; i++) {
            if (linhas[i].includes("#EXTINF:")) {
                const nome = linhas[i].split(',').pop().trim();
                const logo = linhas[i].match(/tvg-logo="([^"]+)"/)?.[1] || "";
                const url = linhas[i+1]?.trim();
                
                if (url && url.startsWith("http")) {
                    let cat = "TV";
                    if (url.includes("/movie/")) cat = "Movies";
                    else if (url.includes("/series/")) cat = "Series";
                    
                    baseTotal.push({ n: nome, l: logo, u: url, c: cat });
                }
            }
        }
        document.getElementById('carregando').style.display = 'none';
        render(baseTotal.slice(0, 100)); // Carrega só os primeiros 100 de cara
    }

    function render(lista) {
        const grid = document.getElementById('listaPrincipal');
        grid.innerHTML = lista.map(item => `
            <a href="player.html?nome=${encodeURIComponent(item.n)}&link=${encodeURIComponent(item.u)}&capa=${encodeURIComponent(item.l)}" class="card">
                <img src="${item.l}" loading="lazy" onerror="this.src='https://via.placeholder.com/150x120?text=Sem+Foto'">
                <h3>${item.n}</h3>
            </a>
        `).join('');
    }

    function aoDigitar() {
        clearTimeout(timeoutBusca);
        timeoutBusca = setTimeout(executarFiltro, 400); // Espera o usuário parar de digitar
    }

    function filtrarCat(cat, btn) {
        categoriaAtual = cat;
        document.querySelectorAll('.btn-cat').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        executarFiltro();
    }

    function executarFiltro() {
        const busca = document.getElementById('txtBusca').value.toLowerCase();
        const resultado = baseTotal.filter(item => {
            const matchesBusca = item.n.toLowerCase().includes(busca);
            const matchesCat = categoriaAtual === 'todos' || item.c === categoriaAtual;
            return matchesBusca && matchesCat;
        });
        render(resultado.slice(0, 200)); // Mostra apenas os 200 mais relevantes
    }

    iniciar();
</script>
</body>
</html>
