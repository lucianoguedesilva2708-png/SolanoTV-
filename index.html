 <!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Solano TV - Oficial</title>
    <style>
        body { background: #050505; color: white; font-family: sans-serif; margin: 0; text-align: center; }
        header { padding: 20px; border-bottom: 2px solid #e50914; background: #000; font-weight: bold; font-size: 24px; color: #e50914; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 15px; padding: 20px; }
        .card { background: #111; border-radius: 8px; overflow: hidden; border: 1px solid #222; cursor: pointer; }
        .card img { width: 100%; height: 180px; object-fit: cover; }
        .card p { font-size: 11px; padding: 5px; margin: 0; height: 30px; overflow: hidden; }
        #loading { padding: 100px; color: #e50914; font-weight: bold; }
    </style>
</head>
<body>

<header>SOLANO TV</header>
<div id="loading">Sincronizando 112MB de conteúdo... <br><small style="color:grey">Isso pode levar 30 segundos na primeira vez.</small></div>
<div id="grid" class="grid"></div>

<script>
    async function carregar() {
        const USER = "434188849";
        const PASS = "606908195";
        // Link da sua lista real
        const linkM3U = `https://p2pro.fun/get.php?username=${USER}&password=${PASS}&type=m3u_plus&output=ts`;
        
        // Proxy para o navegador aceitar o arquivo de 112MB como TEXTO
        const proxy = "https://api.allorigins.win/raw?url=";

        try {
            const res = await fetch(proxy + encodeURIComponent(linkM3U));
            const texto = await res.text(); // Aqui ele transforma o "áudio" em texto!

            if(!texto.includes("#EXTM3U")) throw new Error();

            document.getElementById('loading').style.display = 'none';
            const grid = document.getElementById('grid');
            const linhas = texto.split('\n');
            
            let item = null;
            let limite = 0;

            linhas.forEach(l => {
                if (l.startsWith('#EXTINF:')) {
                    item = {
                        nome: l.split(',')[1] || "Sem Nome",
                        capa: l.match(/tvg-logo="(.*?)"/)?.[1] || "https://via.placeholder.com/150x200?text=SOLANO"
                    };
                } else if (l.startsWith('http') && item) {
                    if (limite < 500) { // Mostra só os primeiros 500 para o celular não travar
                        const card = document.createElement('div');
                        card.className = 'card';
                        card.innerHTML = `<img src="${item.capa}"><p>${item.nome}</p>`;
                        const urlFinal = l.trim();
                        card.onclick = () => window.location.href = `player.html?url=${encodeURIComponent(urlFinal)}&nome=${encodeURIComponent(item.nome)}`;
                        grid.appendChild(card);
                        limite++;
                    }
                    item = null;
                }
            });
        } catch (e) {
            document.getElementById('loading').innerHTML = "O servidor P2PRO demorou a responder.<br>Tente atualizar a página!";
        }
    }
    window.onload = carregar;
</script>
</body>
</html>
