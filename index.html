<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SolanoTV PRO</title>
    <style>
        body { background-color: #0d0d0d; color: white; font-family: sans-serif; margin: 0; padding: 0; }
        header { background-color: #b70909; padding: 15px; text-align: center; font-weight: bold; font-size: 22px; position: sticky; top: 0; z-index: 1000; }
        
        /* Barra de Pesquisa */
        .search-box { padding: 10px; display: flex; justify-content: center; background: #1a1a1a; }
        #search-input { width: 90%; padding: 12px; border-radius: 8px; border: 1px solid #333; background: #222; color: white; outline: none; }
        #search-input:focus { border-color: #b70909; }

        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 10px; }
        .card { background: #1a1a1a; border-radius: 4px; overflow: hidden; text-decoration: none; color: white; border: 1px solid #333; transition: 0.2s; display: flex; flex-direction: column; }
        .card:hover { border-color: #b70909; }
        .card img { width: 100%; height: 130px; object-fit: contain; background: #000; padding: 5px; box-sizing: border-box; }
        .card h3 { font-size: 10px; padding: 8px 5px; margin: 0; text-align: center; background: #000; height: 30px; overflow: hidden; }
        
        #status { text-align: center; padding: 30px; color: #b70909; font-weight: bold; }
        @media (max-width: 600px) { .grid { grid-template-columns: repeat(2, 1fr); } }
    </style>
</head>
<body>

    <header>SOLANOTV PRO</header>

    <div class="search-box">
        <input type="text" id="search-input" placeholder="Pesquisar canal, filme ou série..." onkeyup="filtrar()">
    </div>

    <div id="status">Buscando canais no servidor...</div>
    <div class="grid" id="lista-conteudo"></div>

    <script>
        // Usando AllOrigins para evitar o erro de proxy lotado
        const M3U_URL = "http://p2pro.fun/get.php?username=434188849&password=606908195&type=m3u_plus&output=hls";
        const PROXY_URL = `https://api.allorigins.win/raw?url=${encodeURIComponent(M3U_URL)}`;

        async function carregarLista() {
            const status = document.getElementById('status');
            const container = document.getElementById('lista-conteudo');

            try {
                const response = await fetch(PROXY_URL);
                if (!response.ok) throw new Error("Erro ao acessar servidor");
                
                const data = await response.text();
                const linhas = data.split('\n');
                status.style.display = 'none';

                let html = "";
                let itensEncontrados = 0;

                for (let i = 0; i < linhas.length; i++) {
                    if (linhas[i].includes('#EXTINF:')) {
                        const nome = linhas[i].split(',')[1] || "Sem Nome";
                        const logoMatch = linhas[i].match(/tvg-logo="([^"]+)"/);
                        const capa = logoMatch ? logoMatch[1] : "https://via.placeholder.com/150x150?text=SOLANO+TV";
                        const link = linhas[i + 1]?.trim();

                        if (link && link.startsWith('http')) {
                            html += `
                                <a href="player.html?nome=${encodeURIComponent(nome)}&link=${encodeURIComponent(link)}&capa=${encodeURIComponent(capa)}" class="card" data-nome="${nome.toLowerCase()}">
                                    <img src="${capa}" onerror="this.src='https://via.placeholder.com/150x150?text=IMAGEM+OFFLINE'">
                                    <h3>${nome}</h3>
                                </a>
                            `;
                            itensEncontrados++;
                        }
                    }
                    // Carrega os primeiros 800 itens para não travar o celular
                    if (itensEncontrados > 800) break;
                }
                container.innerHTML = html;

            } catch (error) {
                status.innerHTML = "ERRO DE CONEXÃO!<br><br>O servidor de IPTV recusou a conexão via Proxy.<br>Tente recarregar a página.";
                console.error(error);
            }
        }

        function filtrar() {
            const busca = document.getElementById('search-input').value.toLowerCase();
            const cards = document.getElementsByClassName('card');
            for (let card of cards) {
                const nome = card.getAttribute('data-nome');
                card.style.display = nome.includes(busca) ? "flex" : "none";
            }
        }

        carregarLista();
    </script>
</body>
</html>
