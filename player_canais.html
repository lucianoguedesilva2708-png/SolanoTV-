<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SolanoTV - Live</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; }
        header { background: #b70909; padding: 15px; display: flex; align-items: center; gap: 10px; font-weight: bold; }
        .btn-voltar { color: #fff; text-decoration: none; border: 1px solid #fff; padding: 5px 10px; border-radius: 4px; font-size: 12px; }
        #video-container { flex: 1; display: flex; align-items: center; justify-content: center; background: #000; position: relative; }
        video { width: 100%; height: 100%; max-height: 100vh; }
        #status-msg { position: absolute; bottom: 20px; font-size: 12px; color: yellow; text-align: center; width: 100%; }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="btn-voltar">⬅ VOLTAR</a>
    <span id="nome-canal">Conectando...</span>
</header>

<div id="video-container">
    <video id="video" controls autoplay playsinline></video>
    <div id="status-msg">Iniciando motor de busca...</div>
</div>

<script>
    const params = new URLSearchParams(window.location.search);
    const link = params.get('link');
    const nome = params.get('nome');
    document.getElementById('nome-canal').innerText = nome;

    const video = document.getElementById('video');
    const status = document.getElementById('status-msg');

    function iniciar() {
        if (Hls.isSupported()) {
            const hls = new Hls({
                // Configuração extrema para burlar bloqueios de buffer
                enableWorker: true,
                lowLatencyMode: true,
                fragLoadingMaxRetry: 10,
                manifestLoadingMaxRetry: 10
            });

            // Adicionando um pequeno "truque" no link para o servidor não cachear o bloqueio
            const linkComTimestamp = link + (link.includes('?') ? '&' : '?') + 't=' + Date.now();
            
            hls.loadSource(linkComTimestamp);
            hls.attachMedia(video);

            hls.on(Hls.Events.MANIFEST_PARSED, function() {
                status.innerText = "Sinal estabilizado. Dê Play se não iniciar.";
                video.play();
            });

            hls.on(Hls.Events.ERROR, function(event, data) {
                if (data.fatal) {
                    status.innerHTML = "ERRO: O servidor da lista bloqueou o navegador.<br>Tente no 4G do celular.";
                }
            });
        } 
        else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = link;
            video.play();
        }
    }

    if (link) { iniciar(); }
</script>
</body>
</html>
