<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SolanoTV - Live Streaming</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { margin: 0; background: #000; color: white; font-family: sans-serif; overflow: hidden; }
        .nav { background: #b70909; padding: 10px; display: flex; align-items: center; justify-content: space-between; font-weight: bold; }
        .btn-voltar { color: white; text-decoration: none; border: 1px solid white; padding: 5px 12px; border-radius: 4px; font-size: 13px; }
        #video-container { width: 100vw; height: calc(100vh - 50px); display: flex; align-items: center; justify-content: center; background: #000; }
        video { width: 100%; height: 100%; max-height: 100vh; background: #000; }
        .erro-msg { position: absolute; top: 50%; text-align: center; width: 100%; color: #ff4444; display: none; }
    </style>
</head>
<body>

<div class="nav">
    <a href="index.html" class="btn-voltar">⬅ VOLTAR</a>
    <span id="nome-exibicao">CARREGANDO...</span>
    <div style="width:50px"></div>
</div>

<div id="video-container">
    <video id="video" controls autoplay playsinline crossorigin="anonymous"></video>
    <div id="erro" class="erro-msg">
        SINAL INDISPONÍVEL NO NAVEGADOR<br>
        <small>Tente recarregar ou use o navegador do Celular.</small>
    </div>
</div>

<script>
    const params = new URLSearchParams(window.location.search);
    const linkOriginal = params.get('link');
    const nome = params.get('nome');
    
    document.getElementById('nome-exibicao').innerText = nome;

    const video = document.getElementById('video');
    const erroMsg = document.getElementById('erro');

    // Função para iniciar o Play
    function carregarVideo() {
        if (Hls.isSupported()) {
            const hls = new Hls({
                debug: false,
                enableWorker: true,
                lowLatencyMode: true,
                backBufferLength: 90
            });

            hls.loadSource(linkOriginal);
            hls.attachMedia(video);
            
            hls.on(Hls.Events.MANIFEST_PARSED, function() {
                video.play().catch(() => {
                    console.log("Play automático bloqueado. Aguardando interação.");
                });
            });

            hls.on(Hls.Events.ERROR, function (event, data) {
                if (data.fatal) {
                    console.error("Erro fatal no HLS:", data.type);
                    // Se falhar muito, mostra a mensagem de erro na tela
                    erroMsg.style.display = 'block';
                }
            });

        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            // Suporte nativo para Safari (iPhone)
            video.src = linkOriginal;
            video.addEventListener('loadedmetadata', function() {
                video.play();
            });
        }
    }

    if (linkOriginal) {
        carregarVideo();
    } else {
        alert("Link não encontrado!");
    }
</script>
</body>
</html>
