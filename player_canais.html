<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SolanoTV - Live Player</title>
    <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
    <link href="https://unpkg.com/@videojs/themes@1.0.1/dist/city/index.css" rel="stylesheet">
    
    <style>
        body { margin: 0; background: #000; color: white; font-family: sans-serif; }
        .header-player { background: #b70909; padding: 10px; display: flex; align-items: center; justify-content: space-between; }
        .voltar { color: white; text-decoration: none; font-weight: bold; font-size: 14px; border: 1px solid #fff; padding: 5px 10px; border-radius: 4px; }
        .container { width: 100%; height: calc(100vh - 50px); display: flex; align-items: center; justify-content: center; }
        
        /* Ajuste do Player para ocupar a tela toda no Mobile */
        .video-js { width: 100% !important; height: 100% !important; }
        .vjs-big-play-centered .vjs-big-play-button { background-color: rgba(183, 9, 9, 0.8); border-radius: 50%; width: 2em; height: 2em; line-height: 2em; margin-top: -1em; margin-left: -1em; }
    </style>
</head>
<body>

    <div class="header-player">
        <a href="index.html" class="voltar">⬅ VOLTAR</a>
        <span id="nome-canal">Carregando Canal...</span>
        <div style="width: 50px;"></div> </div>

    <div class="container">
        <video id="video-redetv" class="video-js vjs-theme-city vjs-big-play-centered" controls preload="auto" crossorigin="anonymous">
            <p class="vjs-no-js">Para ver este vídeo, habilite o JavaScript ou use um navegador moderno.</p>
        </video>
    </div>

    <script src="https://vjs.zencdn.net/7.20.3/video.min.js"></script>
    <script src="https://unpkg.com/videojs-contrib-hls/dist/videojs-contrib-hls.js"></script>

    <script>
        const params = new URLSearchParams(window.location.search);
        const link = params.get('link');
        const nome = params.get('nome');

        document.getElementById('nome-canal').innerText = nome || "Canal ao Vivo";

        // Inicializa o Player
        var player = videojs('video-redetv', {
            autoplay: true,
            fluid: true,
            html5: {
                vhs: { overrideNative: true },
                nativeAudioTracks: false,
                nativeVideoTracks: false
            }
        });

        // Carrega o sinal
        if (link) {
            player.src({
                src: link,
                type: 'application/x-mpegURL'
            });
        }

        // Tenta dar play automático (navegadores podem bloquear som de início)
        player.ready(function() {
            var promise = player.play();
            if (promise !== undefined) {
                promise.catch(error => {
                    console.log("O play automático foi bloqueado, aguardando clique.");
                });
            }
        });
    </script>
</body>
</html>
