<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SolanoTV - Live Player</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { margin: 0; background: #000; color: white; font-family: sans-serif; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        .topo { background: #b70909; padding: 12px; display: flex; align-items: center; gap: 15px; font-weight: bold; z-index: 10; }
        .voltar { color: white; text-decoration: none; border: 1.5px solid white; padding: 4px 12px; border-radius: 4px; font-size: 13px; }
        #player-box { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; }
        video { width: 100%; height: 100%; background: #000; }
        .loading-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 5; }
        .spinner { width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid #b70909; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="topo">
    <a href="index.html" class="voltar">⬅ VOLTAR</a>
    <span id="txt-nome">Sincronizando Sinal...</span>
</div>

<div id="player-box">
    <div id="loader" class="loading-overlay">
        <div class="spinner"></div>
        <p style="margin-top:15px; font-size:12px;">CONECTANDO AO P2PRO...</p>
    </div>
    <video id="video-canais" controls playsinline></video>
</div>

<script>
    const params = new URLSearchParams(window.location.search);
    const rawUrl = params.get('link');
    const nome = params.get('nome');
    
    document.getElementById('txt-nome').innerText = nome || "Canal ao Vivo";

    // PROXY DE SEGURANÇA: Tenta burlar o bloqueio do servidor IPTV
    // Esse proxy faz a requisição parecer que vem de um servidor, não do seu site.
    const PROXY = "https://api.allorigins.win/raw?url=";
    const finalUrl = PROXY + encodeURIComponent(rawUrl);

    const video = document.getElementById('video-canais');
    const loader = document.getElementById('loader');

    function iniciarPlayer() {
        if (Hls.isSupported()) {
            const hls = new Hls({
                xhrSetup: function(xhr, url) {
                    // Tenta remover os rastros do navegador para não ser bloqueado
                    xhr.withCredentials = false;
                }
            });

            hls.loadSource(finalUrl);
            hls.attachMedia(video);

            hls.on(Hls.Events.MANIFEST_PARSED, function() {
                loader.style.display = 'none';
                video.play().catch(() => {
                    console.log("Play automático bloqueado.");
                });
            });

            hls.on(Hls.Events.ERROR, function(event, data) {
                if (data.fatal) {
                    console.log("Tentando reconectar sem proxy...");
                    hls.loadSource(rawUrl); // Tenta o link direto se o proxy falhar
                }
            });

        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            // Suporte direto para iPhone/Safari
            video.src = rawUrl;
            video.addEventListener('loadedmetadata', () => {
                loader.style.display = 'none';
                video.play();
            });
        }
    }

    if (rawUrl) {
        iniciarPlayer();
    } else {
        document.body.innerHTML = "<h1>Link inválido!</h1>";
    }
</script>
</body>
</html>
