    <!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SolanoTV - Detalhes</title>
    <style>
        body { background: #0d0d0d; color: white; font-family: sans-serif; margin: 0; text-align: center; }
        .capa { width: 150px; margin-top: 20px; border-radius: 8px; border: 2px solid #b70909; }
        #player-area { width: 100%; aspect-ratio: 16/9; margin-top: 20px; background: #000; display: none; }
        iframe { width: 100%; height: 100%; border: none; }
        .controles { padding: 20px; }
        .btn-play { background: #b70909; color: white; border: none; padding: 15px 30px; border-radius: 5px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <img id="img-capa" class="capa">
    <h1 id="titulo-nome">Título</h1>
    
    <div id="player-area"></div>

    <div class="controles">
        <button class="btn-play" id="btn-assistir">ASSISTIR AGORA</button><br><br>
        <a href="index.html" style="color: #aaa; text-decoration: none;">❮ Voltar para o início</a>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const nome = params.get('nome');
        const capa = params.get('capa');
        const link = params.get('eps');

        document.getElementById('titulo-nome').innerText = nome;
        document.getElementById('img-capa').src = capa;

        document.getElementById('btn-assistir').onclick = function() {
            const area = document.getElementById('player-area');
            area.style.display = 'block';
            area.innerHTML = `<iframe src="${link}" allowfullscreen></iframe>`;
            window.scrollTo(0, area.offsetTop);
        };
    </script>
</body>
</html>
