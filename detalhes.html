
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SolanoTV - Assistir</title>
    <style>
        body { background-color: #0d0d0d; color: white; font-family: sans-serif; margin: 0; padding: 0; text-align: center; }
        header { background-color: #b70909; padding: 15px; font-weight: bold; font-size: 20px; }
        
        .container { padding: 20px; max-width: 800px; margin: auto; }
        .capa-bg { width: 100%; max-height: 300px; object-fit: cover; border-radius: 10px; filter: brightness(0.5); margin-bottom: 20px; }
        
        .video-box { position: relative; width: 100%; padding-top: 56.25%; background: #000; border-radius: 10px; overflow: hidden; border: 2px solid #333; }
        
        /* PLAYER LIMPO: REMOVI AS RESTRIÇÕES DE SANDBOX AQUI */
        iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }

        .lista-eps { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 20px; }
        .ep-btn { background: #1a1a1a; color: white; border: 1px solid #333; padding: 10px; border-radius: 5px; cursor: pointer; font-size: 12px; font-weight: bold; }
        .ep-btn:hover { background: #b70909; border-color: #b70909; }
        .ep-btn.active { background: #b70909; border-color: #fff; }

        .voltar { display: inline-block; margin-top: 30px; color: #aaa; text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>

    <header id="titulo-pagina">SOLANOTV</header>

    <div class="container">
        <img id="capa-detalhe" class="capa-bg" src="">
        
        <div class="video-box">
            <iframe id="video-iframe" src="" allowfullscreen></iframe>
        </div>

        <h2 id="nome-detalhe">Nome do Conteúdo</h2>
        <div class="lista-eps" id="lista-eps">
            </div>

        <a href="index.html" class="voltar">← Voltar para a Início</a>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const nome = params.get('nome');
        const capa = params.get('capa');
        const epsString = params.get('eps');

        document.getElementById('nome-detalhe').innerText = nome;
        document.getElementById('capa-detalhe').src = capa;

        if (epsString) {
            const eps = epsString.split(',');
            const listaDiv = document.getElementById('lista-eps');

            eps.forEach((link, index) => {
                const btn = document.createElement('button');
                btn.className = 'ep-btn';
                btn.innerText = `EP ${index + 1}`;
                btn.onclick = () => carregarVideo(link, btn);
                listaDiv.appendChild(btn);

                // Carrega o primeiro episódio automaticamente
                if (index === 0) carregarVideo(link, btn);
            });
        }

        function carregarVideo(url, btn) {
            document.getElementById('video-iframe').src = url;
            
            // Marca o botão do episódio atual
            document.querySelectorAll('.ep-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            
            // Rola a tela para o topo para ver o player
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    </script>
</body>
</html>
