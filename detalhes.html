<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SolanoTV - Detalhes</title>
    <style>
        body { background: #0d0d0d; color: white; font-family: sans-serif; margin: 0; text-align: center; }
        .capa { width: 180px; margin-top: 25px; border-radius: 8px; border: 2px solid #b70909; box-shadow: 0 0 15px rgba(183, 9, 9, 0.4); }
        #player-area { width: 100%; aspect-ratio: 16/9; margin-top: 20px; background: #000; display: none; }
        iframe { width: 100%; height: 100%; border: none; }
        .controles { padding: 20px; }
        .btn-play { background: #b70909; color: white; border: none; padding: 15px 40px; border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 16px; margin-bottom: 20px; }
        .lista-eps { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 10px; max-width: 500px; margin: 0 auto; display: none; }
        .btn-ep { background: #333; color: white; border: 1px solid #444; padding: 10px; border-radius: 5px; cursor: pointer; font-size: 12px; }
        .btn-ep:hover { background: #b70909; }
        .btn-voltar { display: block; margin-top: 30px; color: #aaa; text-decoration: none; font-size: 14px; padding-bottom: 50px; }
    </style>
</head>
<body>
    <img id="img-capa" class="capa">
    <h1 id="titulo-nome" style="font-size: 18px; padding: 10px;">Título</h1>
    
    <div id="player-area"></div>

    <div class="controles">
        <button class="btn-play" id="btn-assistir">ASSISTIR AGORA</button>
        
        <div id="container-eps" class="lista-eps">
            </div>

        <a href="index.html" class="btn-voltar">❮ Voltar para o início</a>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const nome = params.get('nome');
        const capa = params.get('capa');
        const linksBrutos = params.get('eps');

        document.getElementById('titulo-nome').innerText = nome;
        document.getElementById('img-capa').src = capa;

        document.getElementById('btn-assistir').onclick = function() {
            const container = document.getElementById('container-eps');
            const listaLinks = linksBrutos.split(',');

            // Se tiver só um link (filme), abre direto
            if (listaLinks.length === 1) {
                abrirPlayer(listaLinks[0]);
            } else {
                // Se for série/anime, mostra os botões de episódios
                this.style.display = 'none';
                container.style.display = 'grid';
                container.innerHTML = ''; // Limpa antes de criar
                
                listaLinks.forEach((link, index) => {
                    const btn = document.createElement('button');
                    btn.className = 'btn-ep';
                    btn.innerText = `EPISÓDIO ${index + 1}`;
                    btn.onclick = () => abrirPlayer(link);
                    container.appendChild(btn);
                });
            }
        };

        function abrirPlayer(link) {
            const area = document.getElementById('player-area');
            area.style.display = 'block';
            area.innerHTML = `<iframe src="${link}" allowfullscreen allow="autoplay; encrypted-media"></iframe>`;
            window.scrollTo({ top: area.offsetTop - 20, behavior: 'smooth' });
        }
    </script>
</body>
</html>
