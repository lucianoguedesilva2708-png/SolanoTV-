<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SolanoTV - Player</title>
    <style>
        body { background: #0d0d0d; color: white; font-family: sans-serif; margin: 0; text-align: center; }
        .capa-bg { width: 100%; height: 200px; object-fit: cover; opacity: 0.3; filter: blur(5px); position: absolute; top: 0; left: 0; z-index: -1; }
        .container { padding-top: 40px; }
        .capa { width: 160px; border-radius: 8px; border: 2px solid #b70909; }
        #player-area { width: 100%; aspect-ratio: 16/9; margin-top: 20px; background: #000; display: none; border-top: 2px solid #b70909; border-bottom: 2px solid #b70909; }
        iframe { width: 100%; height: 100%; border: none; }
        .lista-eps { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 20px; max-width: 500px; margin: 0 auto; }
        .btn-ep { background: #b70909; color: white; border: none; padding: 12px; border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 12px; }
        .btn-voltar { display: block; margin: 30px 0; color: #aaa; text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>
    <img id="bg-capa" class="capa-bg">
    <div class="container">
        <img id="img-capa" class="capa">
        <h1 id="titulo-nome">Carregando...</h1>
        
        <div id="player-area"></div>

        <div id="container-eps" class="lista-eps">
            </div>

        <a href="index.html" class="btn-voltar">❮ Voltar para o Início</a>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const nome = urlParams.get('nome');
        const capa = urlParams.get('capa');
        const links = urlParams.get('eps');

        if (nome) document.getElementById('titulo-nome').innerText = nome;
        if (capa) {
            document.getElementById('img-capa').src = capa;
            document.getElementById('bg-capa').src = capa;
        }

        if (links) {
            const listaLinks = links.split(',');
            const container = document.getElementById('container-eps');
            
            listaLinks.forEach((url, index) => {
                const btn = document.createElement('button');
                btn.className = 'btn-ep';
                btn.innerText = listaLinks.length > 1 ? `EPISÓDIO ${index + 1}` : 'ASSISTIR AGORA';
                btn.onclick = () => {
                    const area = document.getElementById('player-area');
                    area.style.display = 'block';
                    area.innerHTML = `<iframe src="${url.trim()}" allowfullscreen></iframe>`;
                    window.scrollTo({ top: area.offsetTop - 20, behavior: 'smooth' });
                };
                container.appendChild(btn);
            });
        }
    </script>
</body>
</html>
