<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SolanoTV - Player PRO</title>
    <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
    <style>
        body { background: #000; margin: 0; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .video-box { width: 100%; max-width: 900px; border: 1px solid #b70909; }
        .btn-voltar { background: #b70909; color: #fff; padding: 10px 20px; text-decoration: none; font-weight: bold; border-radius: 4px; margin-bottom: 15px; }
        h2 { font-size: 16px; margin-top: 10px; text-align: center; }
    </style>
</head>
<body>

    <a href="index.html" class="btn-voltar">⬅ VOLTAR</a>

    <div class="video-box">
        <video id="player-solano" class="video-js vjs-big-play-centered vjs-16-9" controls preload="auto" crossorigin="anonymous">
            <p class="vjs-no-js">Seu navegador não suporta este vídeo.</p>
        </video>
    </div>

    <h2 id="titulo">Carregando canal...</h2>

    <script src="https://vjs.zencdn.net/7.20.3/video.min.js"></script>
    <script>
        const params = new URLSearchParams(window.location.search);
        let videoUrl = params.get('link');
        const videoNome = params.get('nome');

        document.getElementById('titulo').innerText = videoNome;

        // Se o link vier como .ts, tentamos forçar para .m3u8 (HLS) para rodar no site
        if (videoUrl.includes('output=mpegts')) {
            videoUrl = videoUrl.replace('output=mpegts', 'output=hls');
        }

        var player = videojs('player-solano', {
            fluid: true,
            html5: {
                vhs: { overrideNative: true },
                nativeAudioTracks: false,
                nativeVideoTracks: false
            }
        });

        player.src({
            src: videoUrl,
            type: 'application/x-mpegURL' // Define que é um canal de TV (HLS)
        });

        player.play().catch(function(error) {
            console.log("O player aguarda o clique para iniciar.");
        });
    </script>
</body>
</html>
