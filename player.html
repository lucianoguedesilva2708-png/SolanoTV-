<script>
        const params = new URLSearchParams(window.location.search);
        let videoUrl = params.get('link');
        const nomeCanal = params.get('nome');

        document.getElementById('titulo-canal').innerText = nomeCanal;

        // PROXY DE VÍDEO: Isso tenta burlar o bloqueio do servidor nos canais ao vivo
        // Ele faz o pedido do vídeo parecer que vem de um servidor, não do seu navegador
        const videoProxy = "https://api.codetabs.com/v1/proxy?quest=";
        const finalUrl = videoUrl.includes('/live/') ? videoProxy + encodeURIComponent(videoUrl) : videoUrl;

        var player = new Clappr.Player({
            source: finalUrl,
            parentId: "#player",
            width: '100%',
            height: '100%',
            autoPlay: true,
            hlsjsConfig: {
                xhrSetup: function(xhr, url) {
                    xhr.withCredentials = false; // Tenta evitar bloqueio de cookies
                }
            }
        });
    </script>
