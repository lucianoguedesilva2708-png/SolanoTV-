<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SolanoTV - Player</title>
    <style>
        body { background-color: #000; color: white; font-family: sans-serif; margin: 0; padding: 0; text-align: center; overflow: hidden; }
        header { padding: 15px; background: #1a1a1a; display: flex; align-items: center; border-bottom: 1px solid #e50914; }
        .back-btn { color: #e50914; text-decoration: none; font-weight: bold; margin-right: 20px; font-size: 18px; }
        
        /* Container para Player */
        .video-container { position: relative; width: 100%; height: 75vh; background: #000; }
        
        /* O "Pulo do Gato": Usar a tag VIDEO em vez de IFRAME para links de IPTV */
        video { width: 100%; height: 100%; outline: none; }

        .info-video { padding: 15px; text-align: left; background: #0d0d0d; height: 25vh; }
        h2 { color: #e50914; margin: 0 0 5px 0; font-size: 18px; }
        p { color: #ccc; font-size: 13px; margin: 0; }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="back-btn">← VOLTAR</a>
        <span id="titulo-topo" style="font-weight: bold; letter-spacing: 1px;">SOLANOTV</span>
    </header>

    <div class="video-container" id="player">
        <video id="video-obj" controls autoplay playsinline></video>
    </div>

    <div class="info-video">
        <h2 id="nome-item">Carregando título...</h2>
        <p>Você está conectado ao servidor oficial SolanoTV. Se o vídeo travar, verifique sua conexão ou tente recarregar.</p>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const videoUrl = urlParams.get('url');
        const nomeItem = urlParams.get('nome');
        
        if(videoUrl) {
            const v = document.getElementById('video-obj');
            v.src = videoUrl;
            document.getElementById('nome-item').innerText = nomeItem || "Assistindo Agora";
            document.getElementById('titulo-topo').innerText = nomeItem || "SOLANOTV";
        } else {
            document.getElementById('player').innerHTML = `<div style="padding: 50px;">Link inválido ou expirado.</div>`;
        }
    </script>

</body>
</html>
