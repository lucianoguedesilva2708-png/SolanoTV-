<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Player - SolanoTV</title>
    <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
    <style>
        body { background: #000; margin: 0; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        .v-container { width: 100%; max-width: 900px; border: 1px solid #b70909; }
        .back-btn { background: #b70909; color: white; text-decoration: none; padding: 10px 20px; font-weight: bold; border-radius: 5px; margin-bottom: 15px; }
    </style>
</head>
<body>
    <a href="index.html" class="back-btn">⬅ VOLTAR</a>
    <div class="v-container">
        <video id="vid" class="video-js vjs-big-play-centered vjs-16-9" controls preload="auto" data-setup='{}'></video>
    </div>
    <h3 id="vid-title">Carregando...</h3>

    <script src="https://vjs.zencdn.net/7.20.3/video.min.js"></script>
    <script>
        const p = new URLSearchParams(window.location.search);
        document.getElementById('vid-title').innerText = p.get('nome');
        const player = videojs('vid');
        player.src({ src: p.get('link'), type: 'application/x-mpegURL' });
        player.play();
    </script>
</body>
</html>
