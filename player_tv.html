<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SolanoTV - Player de Canais</title>
    <style>
        body { background: #000; color: white; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .video-container { width: 100%; height: 100%; background: #000; position: relative; }
        iframe { width: 100%; height: 100%; border: none; }
        .voltar { position: absolute; top: 15px; left: 15px; background: #b70909; color: white; text-decoration: none; padding: 10px 20px; border-radius: 5px; font-weight: bold; z-index: 99; font-size: 14px; box-shadow: 0 0 10px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

    <a href="index.html" class="voltar">❮ VOLTAR</a>

    <div class="video-container" id="player">
        </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const linkOriginal = params.get('link');

        if (linkOriginal) {
            // Ele cria um iframe que ocupa a tela toda com o site do canal
            document.getElementById('player').innerHTML = `<iframe src="${linkOriginal}" allowfullscreen allow="autoplay; encrypted-media"></iframe>`;
        } else {
            alert("Link do canal não encontrado!");
        }
    </script>
</body>
</html>
