<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>SolanoTV - Player</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>body{background:#000;margin:0;display:flex;justify-content:center;align-items:center;height:100vh;}video{width:100%;max-width:900px;aspect-ratio:16/9;}</style>
</head>
<body>
    <video id="video" controls autoplay></video>
    <script>
        const url = new URLSearchParams(window.location.search).get('link');
        const video = document.getElementById('video');
        if(Hls.isSupported()){
            const hls = new Hls();
            hls.loadSource(url);
            hls.attachMedia(video);
        } else if(video.canPlayType('application/vnd.apple.mpegurl')){
            video.src = url;
        }
    </script>
</body>
</html>
