<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SolanoTV - Player TV</title>
    <style>
        body { background: #000; color: white; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .nav-top { background: #b70909; padding: 10px; text-align: center; font-weight: bold; display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; }
        .btn-voltar { color: white; text-decoration: none; font-size: 12px; background: rgba(0,0,0,0.2); padding: 5px 10px; border-radius: 4px; }
        .iframe-container { flex-grow: 1; width: 100%; height: 100%; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>
    <div class="nav-top">
        <span id="nome-canal">Canal</span>
        <a href="index.html" class="btn-voltar">❮ SAIR</a>
    </div>
    <div class="iframe-container">
        <iframe id="player-frame" src="" allowfullscreen allow="autoplay; encrypted-media"></iframe>
    </div>
    <script>
        const params = new URLSearchParams(window.location.search);
        const link = params.get('link');
        const nome = params.get('nome');

        if(link) {
            document.getElementById('player-frame').src = link;
            document.getElementById('nome-canal').innerText = "ASSISTINDO: " + nome;
        }
    </script>
</body>
</html>
