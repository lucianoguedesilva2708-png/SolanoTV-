<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SolanoTV - Player TV</title>
    <style>
        body { background: #000; color: white; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .nav { background: #b70909; padding: 10px; text-align: center; }
        .btn-voltar { color: white; text-decoration: none; font-weight: bold; background: rgba(0,0,0,0.3); padding: 5px 15px; border-radius: 4px; }
        .iframe-container { flex-grow: 1; width: 100%; height: 100%; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>
    <div class="nav">
        <span id="nome-exibicao">Carregando...</span><br>
        <a href="index.html" class="btn-voltar">❮ VOLTAR</a>
    </div>
    <div class="iframe-container">
        <iframe id="player-frame" src="" allowfullscreen allow="encrypted-media"></iframe>
    </div>
    <script>
        const params = new URLSearchParams(window.location.search);
        const link = params.get('link');
        const nome = params.get('nome');
        if(link) {
            document.getElementById('player-frame').src = link;
            document.getElementById('nome-exibicao').innerText = nome;
        }
    </script>
</body>
</html>
