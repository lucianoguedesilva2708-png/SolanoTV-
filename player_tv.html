<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SolanoTV - Player</title>
    <style>
        body { background: #000; margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        iframe { width: 100%; height: 100%; border: none; }
        .voltar { position: absolute; top: 10px; left: 10px; background: #b70909; color: white; text-decoration: none; padding: 8px 15px; border-radius: 5px; font-size: 12px; z-index: 100; font-weight: bold; }
    </style>
</head>
<body>
    <a href="index.html" class="voltar">❮ VOLTAR</a>
    <div style="width: 100%; height: 100%;">
        <iframe id="player-frame" src="" allow="encrypted-media" allowfullscreen></iframe>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const link = params.get('link');
        if (link) {
            // Adiciona o https: caso o link comece com //
            const urlFinal = link.startsWith('//') ? 'https:' + link : link;
            document.getElementById('player-frame').src = urlFinal;
        }
    </script>
</body>
</html>
