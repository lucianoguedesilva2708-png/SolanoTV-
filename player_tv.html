<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SolanoTV - Live</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { background: #000; color: white; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        .video-box { width: 100%; max-width: 900px; aspect-ratio: 16/9; background: #111; position: relative; }
        video { width: 100%; height: 100%; }
        .controles { padding: 20px; text-align: center; }
        h2 { color: #b70909; margin: 0 0 10px; font-size: 18px; }
        .btn-voltar { background: #b70909; color: white; text-decoration: none; padding: 10px 20px; border-radius: 5px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="video-box">
        <video id="video" controls autoplay playsinline></video>
    </div>

    <div class="controles">
        <h2 id="nome-canal">Carregando...</h2>
        <a href="index.html" class="btn-voltar">VOLTAR À GRADE</a>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const link = params.get('link');
        const nome = params.get('nome');

        document.getElementById('nome-canal').innerText = "🔴 AO VIVO: " + nome;

        const video = document.getElementById('video');
        if (Hls.isSupported()) {
            const hls = new Hls();
            hls.loadSource(link);
            hls.attachMedia(video);
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = link;
        }
    </script>
</body>
</html>
